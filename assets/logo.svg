<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 108" role="img" aria-label="Aurelia Rituals — Premium Sujni Embroidery">
  <title>Aurelia Rituals</title>

  <!-- Lotus mark centered at (100, 36) -->
  <g transform="translate(100,36)" fill="#C9A96E">

    <!-- 4 main petals (cardinal directions) -->
    <path d="M0,0 C-4.5,-8 -4.5,-17 0,-20 C4.5,-17 4.5,-8 0,0Z"/>
    <path d="M0,0 C-4.5,-8 -4.5,-17 0,-20 C4.5,-17 4.5,-8 0,0Z" transform="rotate(90)"/>
    <path d="M0,0 C-4.5,-8 -4.5,-17 0,-20 C4.5,-17 4.5,-8 0,0Z" transform="rotate(180)"/>
    <path d="M0,0 C-4.5,-8 -4.5,-17 0,-20 C4.5,-17 4.5,-8 0,0Z" transform="rotate(270)"/>

    <!-- 4 diagonal petals (smaller) -->
    <path d="M0,0 C-3,-6 -3,-13 0,-15 C3,-13 3,-6 0,0Z" transform="rotate(45)"  opacity="0.6"/>
    <path d="M0,0 C-3,-6 -3,-13 0,-15 C3,-13 3,-6 0,0Z" transform="rotate(135)" opacity="0.6"/>
    <path d="M0,0 C-3,-6 -3,-13 0,-15 C3,-13 3,-6 0,0Z" transform="rotate(225)" opacity="0.6"/>
    <path d="M0,0 C-3,-6 -3,-13 0,-15 C3,-13 3,-6 0,0Z" transform="rotate(315)" opacity="0.6"/>

    <!-- Running-stitch ring: 8 dots at radius 25 -->
    <circle cx="0"      cy="-25"    r="1.4"/>
    <circle cx="17.7"   cy="-17.7"  r="1.4"/>
    <circle cx="25"     cy="0"      r="1.4"/>
    <circle cx="17.7"   cy="17.7"   r="1.4"/>
    <circle cx="0"      cy="25"     r="1.4"/>
    <circle cx="-17.7"  cy="17.7"   r="1.4"/>
    <circle cx="-25"    cy="0"      r="1.4"/>
    <circle cx="-17.7"  cy="-17.7"  r="1.4"/>

    <!-- Centre: solid dot + cream highlight -->
    <circle cx="0" cy="0" r="4"/>
    <circle cx="0" cy="0" r="1.8" fill="#FAF6F0" opacity="0.7"/>
  </g>

  <!-- Brand name: AURELIA -->
  <text
    x="100" y="70"
    text-anchor="middle"
    font-family="Georgia,'Times New Roman',serif"
    font-size="22"
    letter-spacing="4"
    fill="#2C2C2C">AURELIA</text>

  <!-- Gold divider with centre dot -->
  <line x1="30"  y1="79" x2="88"  y2="79" stroke="#C9A96E" stroke-width="0.65"/>
  <circle cx="100" cy="79" r="2.2" fill="#C9A96E"/>
  <line x1="112" y1="79" x2="170" y2="79" stroke="#C9A96E" stroke-width="0.65"/>

  <!-- Sub-name: RITUALS -->
  <text
    x="100" y="95"
    text-anchor="middle"
    font-family="Georgia,'Times New Roman',serif"
    font-size="10"
    letter-spacing="6"
    fill="#C9A96E">RITUALS</text>
</svg>
